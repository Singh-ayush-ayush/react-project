<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        p {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        /* Input Styling */
        .inputs {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border 0.3s;
        }

        .inputs:focus {
            border-color: #007bff;
        }

        /* BUTTON LAYOUT: This puts them side-by-side */
        .button-group {
            display: inline-flex;
            gap: 10px;
            margin-left: 5px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        #addDate {
            background-color: #28a745;
            color: white;
        }

        #clear-list {
            background-color: #dc3545;
            color: white;
        }

        button:hover {
            opacity: 0.8;
        }

        /* List Item Styling */
        #displayvalue {
            margin-top: 30px;
        }

        .list-item {
            display: flex; 
            justify-content: space-between; /* Ensures space is distributed */
            width: 500px; /* Setting a width to make the gap visible */
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        /*Specific gap you requested */
        .task-name {
            flex: 1;
        }
        
        .task-date {
            margin-left: 147px; /* Your specific gap*/ 
            color: #666;
            font-size: 14px;
        }

        .delete-btn {
    background-color: #ffc107; /* Yellow color for 'completed' */
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 20px; /* Space after the date */
}

.delete-btn:hover {
    background-color: #e0a800;
}

    </style>
</head>
<body>

    <div class="container">
        <p>To Do List</p>
        
        <input class="inputs" id="todo-name" type="text" placeholder="Enter work...">
        <input class="inputs" id="date" type="date">
        
        <div class="button-group">
            <button id="addDate" onclick="addTodoList()">Add</button>
            <button id="clear-list" onclick="cleanList()">Delete All</button>
        </div>

        <div id="displayvalue"></div>
    </div>

    <script>
        function addTodoList() {
            const inputElement = document.getElementById('todo-name');
            const inputDate = document.getElementById("date");
            const display = document.getElementById("displayvalue");

            if (inputElement.value === "") {
                alert("Please enter a task!");
                return;
            }

            const newItem = document.createElement("div");
            newItem.classList.add("list-item");

            // We use spans with classes for better styling control
            newItem.innerHTML = `
                <span class="task-name">${inputElement.value}</span>
                <span class="task-date">${inputDate.value}</span>
                <button class="delete-btn" onclick="this.parentElement.remove()">Done</button>
            `;
             
            
            display.appendChild(newItem);

            // Clear inputs after adding
            inputElement.value = '';
            inputDate.value = '';
        }

        function cleanList() {
            // This clears the entire list area
            document.getElementById("displayvalue").innerHTML = '';
        }
    </script>
</body>
</html>
