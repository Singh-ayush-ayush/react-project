<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Valdidation</title>
    <style>
        body{
            margin:0px;
            padding:0px;
            display:flex;
            justify-content: center; 
            align-items: center;
            height:500px;  
            background-color:lightgray;
        }
        #mainDiv{
              border: 4px solid black;
              display: flex;
              justify-content: center;
              align-items: center;
              width: 360px;
              height:360px;
              padding: 10px 10px 10px 10px;
              border-radius: 12%;
              background-color: lightgrey;
              
         }
         h1{
            padding-left: 70px;
         }
         .input{
            width:220px;
            height: 23px;
            border-radius: 4%;
            border: none;
            text-align: center;
            font-weight: bolder;
         }
         button[type="submit"]{
            margin-left:32%;
            width: 80px;
            height: 30px;
            border-radius: 9%;
            border: none;
            font-weight: bolder;
            background-color: rgb(112, 204, 150);
         }
        
    </style>
</head>
<body>
    <div id="mainDiv">     
    <form id="loginForm">
        <h1 id="h1tag">login</h1>
        <input class="input" id="username" type="text" placeholder="user name"><br><br>
        <input class="input" id="password" type="password" placeholder="password"><br><br>
        <button  id="submit" type="submit" >submit</button>
    </form>
    <div></div>
    </div>
   <script>
    let userName =document.getElementById("username");
    let password =document.getElementById("password");
    let btn = document.getElementById("submit");
    

    userName.addEventListener("submit",checkError);
    password.addEventListener("submit",checkError);
    
    loginForm.addEventListener("submit", function(event){
        event.preventDefault();
          
       if(checkError()){
        alert("form submitted successfully");
        userName.value="";
        password.value="";
        let clearPage = document.body.innerHTML=` 
          <style>
            body{
             background-colour : white;
            }
            
            h1{
             display:flex
             justify-content:center;
             align-item:center;
            }
          </style>
          <h1> your info has been submitted please wait a while!</h1>
        `; }
    });

       function checkError(){
        const userVal = userName.value.trim();
        const passVal = password.value.trim();

        if(userVal.value =="")return showError("user name cannot be empty");

        if(userVal.length<4) return showError("user name should be more than 4 char");

        if(passVal =="") return showError("pass cannot be empty");

        if(passVal.length <4) return showError(" pass should be more than 4 char");
        
        

        return true;
 
       }

       function showError(error){
        alert(error);
        return false;
       }
       
     
    
     
  

   </script>
</body>
</html>
